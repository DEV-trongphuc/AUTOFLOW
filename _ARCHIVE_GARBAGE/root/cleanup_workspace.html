<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workspace Cleanup Tool</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            border-left: 4px solid #667eea;
        }

        .stat-card h3 {
            font-size: 14px;
            color: #6c757d;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #212529;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-danger {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        .log {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            max-height: 400px;
            overflow-y: auto;
            margin-top: 20px;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 4px;
        }

        .log-success {
            color: #4ade80;
        }

        .log-error {
            color: #f87171;
        }

        .log-warning {
            color: #fbbf24;
        }

        .log-info {
            color: #60a5fa;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🧹 Workspace Cleanup Tool</h1>
            <p>Remove duplicate files from database</p>
        </div>

        <div class="content">
            <div id="stats" class="stats-grid">
                <div class="stat-card">
                    <h3>Total Records</h3>
                    <div class="value" id="totalRecords">-</div>
                </div>
                <div class="stat-card">
                    <h3>Duplicate Groups</h3>
                    <div class="value" id="duplicateGroups">-</div>
                </div>
                <div class="stat-card">
                    <h3>Records to Delete</h3>
                    <div class="value" id="toDelete">-</div>
                </div>
            </div>

            <button id="analyzeBtn" class="btn" onclick="analyze()">
                📊 Analyze Duplicates
            </button>

            <button id="cleanupBtn" class="btn btn-danger hidden" onclick="cleanup()">
                🗑️ Delete All Duplicates
            </button>

            <div id="spinner" class="spinner hidden"></div>

            <div id="log" class="log hidden"></div>
        </div>
    </div>

    <script>
        const API_URL = window.location.hostname.includes('localhost')
            ? 'https://automation.ideas.edu.vn/mail_api'
            : '/mail_api';

        function addLog(message, type = 'info') {
            const log = document.getElementById('log');
            log.classList.remove('hidden');
            const line = document.createElement('div');
            line.className = `log-line log-${type}`;
            line.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            log.appendChild(line);
            log.scrollTop = log.scrollHeight;
        }

        async function analyze() {
            const btn = document.getElementById('analyzeBtn');
            const spinner = document.getElementById('spinner');
            const cleanupBtn = document.getElementById('cleanupBtn');

            btn.disabled = true;
            spinner.classList.remove('hidden');
            cleanupBtn.classList.add('hidden');

            addLog('Starting analysis...', 'info');

            try {
                const response = await fetch(`${API_URL}/cleanup_workspace_api.php?action=analyze`);
                const data = await response.json();

                if (data.success) {
                    document.getElementById('duplicateGroups').textContent = data.duplicate_groups;
                    document.getElementById('toDelete').textContent = data.records_to_delete;

                    addLog(`Found ${data.duplicate_groups} groups of duplicates`, 'warning');
                    addLog(`Total records to delete: ${data.records_to_delete}`, 'warning');

                    if (data.records_to_delete > 0) {
                        cleanupBtn.classList.remove('hidden');
                        addLog('Ready to cleanup. Click the red button to proceed.', 'info');
                    } else {
                        addLog('✅ No duplicates found! Database is clean.', 'success');
                    }
                } else {
                    addLog('❌ Error: ' + data.message, 'error');
                }
            } catch (error) {
                addLog('❌ Network error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }

        async function cleanup() {
            if (!confirm('⚠️ This will permanently delete duplicate records. Continue?')) {
                return;
            }

            const btn = document.getElementById('cleanupBtn');
            const spinner = document.getElementById('spinner');

            btn.disabled = true;
            spinner.classList.remove('hidden');

            addLog('Starting cleanup...', 'warning');

            try {
                const response = await fetch(`${API_URL}/cleanup_workspace_api.php?action=cleanup`, {
                    method: 'POST'
                });
                const data = await response.json();

                if (data.success) {
                    addLog(`✅ Successfully deleted ${data.deleted_count} duplicate records`, 'success');
                    document.getElementById('toDelete').textContent = '0';
                    btn.classList.add('hidden');

                    // Refresh stats
                    setTimeout(analyze, 1000);
                } else {
                    addLog('❌ Error: ' + data.message, 'error');
                }
            } catch (error) {
                addLog('❌ Network error: ' + error.message, 'error');
            } finally {
                btn.disabled = false;
                spinner.classList.add('hidden');
            }
        }

        // Auto-analyze on load
        window.addEventListener('load', analyze);
    </script>
</body>

</html>
